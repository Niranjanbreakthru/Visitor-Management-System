    // ════════════════════════════════════════════════════════
    //  REQUEST GUARD — 429 backoff with per-endpoint cooldown
    // ════════════════════════════════════════════════════════
    const _bc = {}; // blockedUntil[url]

    function guardedFetch(input, init = {}, opts = {}) {
      const url = typeof input === 'string' ? input : input.url;
      const { retries = 3, base = 1000, maxDelay = 30_000 } = opts;

      const attempt = (n, delay) => {
        const now = Date.now();
        if (_bc[url] && now < _bc[url]) return new Promise(r =>
          setTimeout(() => attempt(n, delay), Math.max(0, _bc[url] - now) + delay)
        );
        return fetch(input, init)
          .then(res => {
            if (res.status === 429) {
              const retryAfter = Math.min(
                parseInt(res.headers.get('Retry-After') || '1', 10) * 1000,
                maxDelay
              );
              const nextWait = Math.min(base * Math.pow(2, n) + retryAfter, maxDelay);
              _bc[url] = Date.now() + nextWait;
              if (n < retries) return new Promise(r => setTimeout(r, nextWait)).then(() => attempt(n + 1, delay));
              throw new Error('429 Too Many Requests — max retries exceeded');
            }
            return res;
          });
      };
      return {
        step: 0,
        appt: null, apptCode: '', apptFound: false, apptLookupDone: false,
        v: {
          name: '', company: '', phone: '', email: '',
          purpose: '', purposeCustom: '', hostId: '',
          idType: '', idNumber: '', idNumberRaw: '',
          countryCode: 'IN',
          visitorType: 'Individual', teamName: '', teamCount: 2, teamMembers: [],
        },
        photo: null, idValidated: false, agrSigned: false,
        approved: null, rfid: null,
        inTime: null, outTime: null, sessionId: null,
        waitTmr: null, camStream: null, cdTmr: null, cdVal: 5,
        approvalSent: false, poller: null,
        phoneEmailDone: false,
        faceCheckInterval: null,
        isAutoCapturing: false,
        aadhaarMasked: false,
        idMasked: false,
        idLastNUnmasked: 0,
        idLastUnmaskedType: '',
        returningVisitor: null,
        returningVisitorDetail: null,
        otpReady: false,
        otp: {
          method: null,
          contact: '',
          otpSent: false,
          otpVerified: false,
          otpCode: '',
          countdown: 0,
          resendCount: 0,
          maxResends: 3,
          attempts: 0,
          maxAttempts: 5,
          timerInterval: null,
        },
      };
    }

    // ════════════════════════════════════════════════════════
    //  APPROVAL FLOW
    // ════════════════════════════════════════════════════════
    function sendApprovalRequest() {
      const host = gh(S.v.hostId);
      guardedFetch('http://localhost:5000/send-approval', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          visitorName: S.v.name,
          company: S.v.company,
          purpose: S.v.purpose,
          hostId: S.v.hostId,
          sessionId: S.sessionId,
        }),
      }, { retries: 4, base: 2000, maxDelay: 60_000 })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            console.error('[Approval] Server error:', data.error);
            toast('Approval request error: ' + data.error, 'err');
            return;
          }
          console.log(`[Approval] Sent. Email: ${data.email_ok ? '✓' : '✗'}, Telegram: ${data.telegram_ok ? '✓' : '✗'}`);
          if (!data.email_ok && !data.telegram_ok) {
            toast('Could not reach host via Email or Telegram. Check network.', 'err');
          } else if (!data.email_ok) {
            toast('Telegram sent. Email delivery failed.', 'warn');
          } else if (!data.telegram_ok) {
            toast('Email sent. Telegram delivery failed.', 'warn');
          }
        })
        .catch(err => {
          if (err.message?.includes('429')) {
            console.warn('[Approval] Rate-limited. Will retry on next manual action.');
            toast('Server busy. Retry in a few seconds.', 'warn');
          } else {
            console.error('[Approval] Network error:', err);
            toast('Failed to send approval request. Backend unreachable.', 'err');
          }
        });
    }

    function startApprovalPolling() {
      clearPoller();
      let attempt = 0;
      const maxAttempts = 3;
      const poll = () => {
        guardedFetch(`http://localhost:5000/check-status/${S.sessionId}`, {}, { retries: 2, base: 1000, maxDelay: 10_000 })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'approved') { clearPoller(); S.approved = true; goStep(6); }
            else if (data.status === 'denied') { clearPoller(); S.approved = false; goStep(6); }
            else if (data.status === 'rejected') { clearPoller(); S.approved = false; goStep(6); }
          })
          .catch(err => {
            if (err.message?.includes('429')) {
              attempt++;
              console.warn(`[Poll] 429 received, backing off (attempt ${attempt}/${maxAttempts})`);
              if (attempt >= maxAttempts) {
                clearPoller();
                toast('Server busy. Polling paused. Please refresh.', 'warn');
              } else {
                setTimeout(poll, 5000 * attempt);
              }
            } else {
              // network/logic error — silent swallow per original behaviour
            }
          });
      };
      S.poller = setInterval(poll, 10_000);
    }

    function clearPoller() { if (S.poller) { clearInterval(S.poller); S.poller = null; } }
    function resendApproval() { sendApprovalRequest(); toast('Approval request resent', 'ok'); }

    //  STEP NAVIGATION
    // ════════════════════════════════════════════════════════
    function goStep(n) {
      if (S.step === 2 && n !== 2) stopCam();
      if (S.waitTmr) { clearInterval(S.waitTmr); S.waitTmr = null; }
      if (S.step === 5 && n !== 5) clearPoller();

      // Reset all state when starting a fresh visitor session (step 1 - Check-In/Welcome flow)
      if (n === 1) {
        S = mkState();
        S.step = 1;
        render();
        return;
      }

      // Reset returning visitor state when navigating to registration
      if (n === 2) {
        S.returningVisitor = null;
        S.returningVisitorDetail = null;
      }

      // After Access/RFID (step 6), redirect to Welcome page
      if (S.step === 6 && n === 7) {
        S.step = 0; // Redirect to Welcome
        render();
        toast('Visit activated successfully. Screen will reset for privacy.', 'ok');
        return;
      }

      // Block premature navigation to Awaiting (step 5) and Access/RFID (step 6)
      // Step 5 should only be reached via Notification step (step 4) flow
      if (n === 5 && !S.approvalSent && S.step !== 4) {
        return; // Prevent accessing Awaiting directly without approval
      }
      // Step 6 should only be reached after approval decision
      if (n === 6 && (S.approved !== true && S.approved !== false)) {
        return; // Prevent accessing Access/RFID without approval decision
      }

      S.step = n;
      render();
      if (n === 5 && !S.approvalSent) {
        sendApprovalRequest();
        startApprovalPolling();
        S.approvalSent = true;
      }
    }

    function toggleCCDropdown() {
      const panel = $('ccPanel');
      const trigger = $('ccTrigger');
      if (!panel) return;
      const isOpen = panel.classList.contains('open');
      if (isOpen) {
        closeCCDropdown();
      } else {
        panel.classList.add('open');
        trigger.classList.add('open');
        const search = $('ccSearch');
        if (search) { search.value = ''; filterCCOptions(''); setTimeout(() => search.focus(), 50); }
        startCCListNav(panel); // CHANGE 1: first-letter keyboard navigation
        // Scroll selected option into view
        setTimeout(() => {
          const sel = document.querySelector('#ccList .cc-option.selected');
          if (sel) sel.scrollIntoView({ block: 'nearest' });
        }, 60);
      }
    }

    function closeCCDropdown() {
      const panel = $('ccPanel');
      const trigger = $('ccTrigger');
      if (panel) panel.classList.remove('open');
      if (trigger) trigger.classList.remove('open');
    }

    function selectCC(key) {
      S.v.countryCode = key;
      closeCCDropdown();
      // Update trigger display
      const cc = COUNTRY_CODES[key];
      const trigger = $('ccTrigger');
      if (trigger && cc) {
        trigger.innerHTML = `<span class="cc-trigger-flag">${cc.flag}</span>
      <span class="cc-trigger-code">${cc.code}</span>
      <span class="cc-trigger-arrow"></span>`;
        trigger.classList.remove('open');
      }
      renderPhoneHint();
      // Update selected highlight
      document.querySelectorAll('#ccList .cc-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.key === key);
      });
    }

    function filterCCOptions(query) {
      const list = $('ccList');
      if (!list) return;
      const q = query.trim().toLowerCase();
      const opts = list.querySelectorAll('.cc-option');
      let visible = 0;
      opts.forEach(el => {
        const key = el.dataset.key;
        const cc = COUNTRY_CODES[key];
        const match = !q
          || cc.name.toLowerCase().includes(q)
          || cc.code.includes(q)
          || key.toLowerCase().includes(q);
        el.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      let noRes = list.querySelector('.cc-no-results');
      if (!visible) {
        if (!noRes) { noRes = document.createElement('div'); noRes.className = 'cc-no-results'; list.appendChild(noRes); }
        noRes.textContent = `No results for "${query}"`;
      } else if (noRes) {
        noRes.remove();
      }
    }

    // ── CC first-letter keyboard navigation ──────────────────
    let _ccNavBuf = '';
    let _ccNavTimer;

    function startCCListNav(panel) {
      panel.addEventListener('keydown', e => {
        const ch = e.key;
        if (ch.length !== 1 || /[^a-z]/i.test(ch)) return;
        const q = ch.toLowerCase();
        _ccNavBuf = _ccNavBuf + q;
        clearTimeout(_ccNavTimer);
        _ccNavTimer = setTimeout(() => { _ccNavBuf = ''; }, 900);
        // Find next visible match after the current selection
        const opts = panel.querySelectorAll('.cc-option:not([style*="display: none"])');
        let startIdx = -1;
        opts.forEach((el, i) => { if (el.classList.contains('selected')) startIdx = i; });
        for (let i = 1; i <= opts.length; i++) {
          const idx = (startIdx + i) % opts.length;
          const el = opts[idx];
          const cc = COUNTRY_CODES[el.dataset.key];
          if (cc.name.toLowerCase().startsWith(q) || el.dataset.key.toLowerCase().startsWith(q) || cc.code.startsWith(q)) {
            el.scrollIntoView({ block: 'nearest' });
            break;
          }
        }
      });
    }

        try { if (iframe.contentWindow) iframe.contentWindow.print(); } catch (e) { console.error('Print failed:', e); }

        qr.addData(payload);
        qr.make();
        const imgTag = qr.createSvgTag({ cellSize: 4, margin: 2 });
        const svgWrap = `<img src="data:image/svg+xml;base64,${btoa(imgTag)}" style="width:100px;height:100px" alt="QR Code">`;

      } catch (e) {
        console.error('[QR] generation failed', e);
        return '';

    function submitReg() {
      if (!S.otp.otpVerified) {
        toast('Please verify your email before continuing.', 'err');
        return;
      }
      // Sync form values
      [['fname', 'name'], ['fco', 'company'], ['femail', 'email'], ['fpur', 'purpose'],
      ['fhost', 'hostId'], ['fidtype', 'idType'], ['fvisitorType', 'visitorType'],
      ['teamName', 'teamName'], ['teamCount', 'teamCount']
      ].forEach(([id, k]) => {
        const el = $(id);
        if (el) S.v[k] = id === 'teamCount' ? Number(el.value) : el.value;
      });
      // Sync purpose custom
      const fpurOther = $('fpurOther');
      if (fpurOther) S.v.purposeCustom = fpurOther.value;

      if (!validateForm()) return;
      if (!S.photo) { toast('A valid photo with a visible face is required. Please capture a photo before continuing.', 'err'); return; }

      // Validate ID
      if (!validateIdLive()) {
        toast('Please enter a valid ID number format.', 'err'); return;
      }
      goStep(3);
    }

    function validateForm() {
      const effectivePurpose = S.v.purpose === 'Other' ? S.v.purposeCustom : S.v.purpose;
      let ok = true;

      // Validate Full Name
      const nameResult = validateFullName(S.v.name);
      const nameEl = $('fname');
      const nameEr = $('fname_e');
      if (!nameResult.ok) {
        if (nameEl) nameEl.classList.add('err');
        if (nameEr) nameEr.textContent = nameResult.error;
        ok = false;
      } else {
        if (nameEl) nameEl.classList.remove('err');
        if (nameEr) nameEr.textContent = '';
      }

      // Validate Company
      const coResult = validateCompany(S.v.company);
      const coEl = $('fco');
      const coEr = $('fco_e');
      if (!coResult.ok) {
        if (coEl) coEl.classList.add('err');
        if (coEr) coEr.textContent = coResult.error;
        ok = false;
      } else {
        if (coEl) coEl.classList.remove('err');
        if (coEr) coEr.textContent = '';
      }

      // Validate Purpose
      if (!S.v.purpose) {
        const purEl = $('fpur');
        const purEr = $('fpur_e');
        if (purEl) purEl.classList.add('err');
        if (purEr) purEr.textContent = 'Select a purpose';
        ok = false;
      } else {
        const purEl = $('fpur');
        const purEr = $('fpur_e');
        if (purEl) purEl.classList.remove('err');
        if (purEr) purEr.textContent = '';
      }

      // Purpose 'Other' needs custom text validation
      if (S.v.purpose === 'Other') {
        const purOtherResult = validatePurposeOther(S.v.purposeCustom);
        const el = $('fpurOther');
        const er = $('fpurOther_e');
        if (!purOtherResult.ok) {
          if (el) el.classList.add('err');
          if (er) er.textContent = purOtherResult.error;
          ok = false;
        } else {
          if (el) el.classList.remove('err');
          if (er) er.textContent = '';
        }
      }

      // Validate Host
      if (!S.v.hostId) {
        const hostEl = $('fhost');
        const hostEr = $('fhost_e');
        if (hostEl) hostEl.classList.add('err');
        if (hostEr) hostEr.textContent = 'Please select a host to continue.';
        ok = false;
      } else {
        const hostEl = $('fhost');
        const hostEr = $('fhost_e');
        if (hostEl) hostEl.classList.remove('err');
        if (hostEr) hostEr.textContent = '';
      }

      // Validate ID Type
      if (!S.v.idType) {
        const idTypeEl = $('fidtype');
        const idTypeEr = $('fidtype_e');
        if (idTypeEl) idTypeEl.classList.add('err');
        if (idTypeEr) idTypeEr.textContent = 'Select an ID type';
        ok = false;
      } else {
        const idTypeEl = $('fidtype');
        const idTypeEr = $('fidtype_e');
        if (idTypeEl) idTypeEl.classList.remove('err');
        if (idTypeEr) idTypeEr.textContent = '';
      }

      // Validate phone at submit
      const phRes = validatePhone(S.v.phone, S.v.countryCode || 'IN');
      if (!phRes.ok) {
        const er = $('fph_e');
        if (er) er.textContent = phRes.error;
        ok = false;
      }

      if (S.v.visitorType === 'Team') {
        const count = S.v.teamCount || 0;
        const cntEl = $('teamCount'), cntEr = $('teamCount_e');
        if (count < 2) { cntEl?.classList.add('err'); if (cntEr) cntEr.textContent = 'Minimum team size is 2'; ok = false; }
        else { cntEl?.classList.remove('err'); if (cntEr) cntEr.textContent = ''; }
        (S.v.teamMembers || []).forEach((name, i) => {
          const el = $(`teamMember${i}`), er = $(`teamMember${i}_e`);
          if (!el) return;
          if (!name || !name.trim()) { el.classList.add('err'); if (er) er.textContent = `Member ${i + 2} name required.`; ok = false; }
          else { el.classList.remove('err'); if (er) er.textContent = ''; }
        });
      }
      return ok;
    }

    function onAgrScroll() {
      const el = $('agrBox'), row = $('agrCbRow'), hint = $('agrHint');
      if (!el || !row) return;
      if (el.scrollTop + el.clientHeight >= el.scrollHeight - 10) {
        row.style.opacity = '1'; row.style.pointerEvents = 'auto';
        if (hint) hint.style.display = 'none';
      }
    }
    function updateAgree() { const b = $('agreeBtn'); if (b) b.disabled = !S.agrSigned; }

function sendNotif() {
      const btn = $('notifyBtn');
      if (btn) { btn.innerHTML = `<div class="spinner"></div> Sending…`; btn.disabled = true; }
      const h = gh(S.v.hostId);
      S.sessionId = S.sessionId || genSid();
      // Resolve effective purpose
      if (S.v.purpose === 'Other' && S.v.purposeCustom) S.v.purpose = S.v.purposeCustom;
      
      // Call backend API to create visit and send host approval email
      // This works for both walk-in and appointment flows
      if (typeof window.sendApprovalRequest === 'function') {
        window.sendApprovalRequest().then(() => {
          toast(`Notification sent to ${h ? h.name : 'host'}.`, 'ok');
          goStep(5);
          startWait();
          if (typeof window.startApprovalPolling === 'function') window.startApprovalPolling();
        }).catch(err => {
          console.error('[sendNotif] API call failed:', err);
          toast('Failed to send notification: ' + err.message, 'err');
          if (btn) { btn.innerHTML = `${ic(I.send, 13)} Send Notification`; btn.disabled = false; }
        });
      } else {
        // Fallback for when bridge not loaded
        setTimeout(() => {
          toast(`Notification sent to ${h ? h.name : 'host'}.`, 'ok');
          goStep(5);
          startWait();
        }, 700);
      }
    }

    function startWait() {
      const start = Date.now(); let shown = false;
      S.waitTmr = setInterval(() => {
        const el = $('waitTmr');
        if (el) el.textContent = elapsed(start);
        if (!shown && (Date.now() - start) > 45000) {
          const rb = $('resendBox');
          if (rb) { rb.style.display = 'flex'; shown = true; }
        }
      }, 1000);
    }

function simApproval(approved) {
      clearPoller();
      if (S.waitTmr) { clearInterval(S.waitTmr); S.waitTmr = null; }
      S.approved = approved;
      if (approved) { S.rfid = null; goStep(6); setStatus('Access approved! Please assign a physical RFID card.', 'ok'); setTimeout(hideStatus, 4500); }
      else { goStep(6); setStatus('Access denied. Visit logged.', 'err'); }
    }

    function activateVisitLocal() {
      const isQr = Store.getBadgeType() === 'qr';
      if (!isQr && !S.rfid) { toast('Please select an RFID card slot first.', 'err'); return; }
      const ok = isQr ? true : Store.assignTag(S.rfid, S.v.name);
      if (!ok) { toast('That card is already assigned. Please select another.', 'err'); S.rfid = null; renderPanel(); return; }
      S.inTime = Date.now();
      const h = gh(S.v.hostId);
      Store.addSession({
        id: S.sessionId, name: S.v.name, company: S.v.company,
        email: S.v.email, host: h ? h.name : '—', purpose: S.v.purpose,
        photo: S.photo || '',
        idType: S.v.idType, idNumber: S.v.idNumber, rfid: isQr ? null : S.rfid,
        inTime: S.inTime, status: 'active', hadAppointment: S.apptFound || false,
        visitorType: S.v.visitorType, teamName: S.v.teamName,
        teamCount: S.v.teamCount, teamMembers: S.v.teamMembers?.slice() || [],
        badgeType: isQr ? 'qr' : 'rfid',
      });
      saveToHistory(S.v);
      renderHamBody();
      // Redirect to Welcome page after successful activation
      goStep(0);
      toast(`${isQr ? 'QR Badge' : 'RFID ' + S.rfid} activated. Screen reset for privacy.`, 'ok');
    }

    // activateVisit is called directly - checks for bridge override
    function activateVisit(overrideBadgeType) {
      Store.setBadgeType(overrideBadgeType || 'rfid');
      // Check if bridge override exists
      if (window._bridgeActivateVisit) {
        window._bridgeActivateVisit(overrideBadgeType);
      } else {
        activateVisitLocal();
      }
    }

    function doCheckout() {
      // Use bridge implementation if available
      if (window._bridgeDoCheckout) {
        window._bridgeDoCheckout();
      } else {
        const hasRFID = S.rfid && S.rfid.trim() !== '';
        const cb = $('tagRet');
        if (hasRFID && (!cb || !cb.checked)) { toast('Confirm RFID card returned before checkout.', 'err'); return; }
        S.outTime = Date.now();
        S.lastCompletedSessionId = S.sessionId;
        Store.checkoutSession(S.sessionId);
        renderHamBody();
        // Go to complete screen for success message
        goStep(9);
        toast('Checkout complete. Record saved.', 'ok');
      }
    }

    function startNewVisitor() {
      if (S.approvalSent && (S.step === 6)) {
        toast('You are already notified to the host.', 'err');
        return;
      }
      stopCam(); clearCountdown(); clearPoller(); stopFaceCheck();
      if (S.waitTmr) { clearInterval(S.waitTmr); S.waitTmr = null; }
      S = mkState(); hideStatus(); render();
      toast('New visitor session started.', 'ok');
    }
    function startNewVisitorFromHam() {
      if (S.approvalSent && (S.step === 6)) {
        toast('You are already notified to the host.', 'err');
        return;
      }
      closeHam(); startNewVisitor();
    }

    // ════════════════════════════════════════════════════════
    //  RESET
    // ════════════════════════════════════════════════════════
    function confirmReset() { openModal('overlay'); }
    $('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeModal('overlay'); });

    function doReset() {
      closeModal('overlay');
      stopCam(); clearCountdown(); clearPoller(); stopFaceCheck();
      if (S.waitTmr) { clearInterval(S.waitTmr); S.waitTmr = null; }
      S = mkState(); hideStatus(); render();
      toast('Session reset.', 'ok');
    }

    let phoneLookupLock = false;

    // ════════════════════════════════════════════════════════
    //  RENDER ENGINE
    // ════════════════════════════════════════════════════════
    async function renderPanel() {
      const fns = panels();
      await PanelRender();
      if (typeof generateQrIfNeeded === 'function') generateQrIfNeeded();
      // Camera starts ONLY after OTP is verified (Phase 2 revealed).
      // Before that, the camera area is blank/disabled — no stream is opened,
      // preventing blank-frame / tainted-canvas errors post OTP entry.
      if (S.step === 2 && !S.photo && !S.camStream && S.otp && S.otp.otpVerified) setTimeout(() => startCam('regVid'), 150);
      if (S.step === 3) {
        setTimeout(() => {
          const b = $('agrBox');
          if (b) b.addEventListener('scroll', onAgrScroll, { passive: true });
        }, 100);
      }
    }
    async function PanelRender() {
      const fns = panels();
      $('panel').innerHTML = await (fns[S.step] || (() => ''))();
    }

    function render() { renderTracker(); updateTopbar(); renderPanel(); }
    render();
  </script>
</body>

</html>
